<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      :root {
        --ink: #405064;
        --lav: #dcd7ff;
        --mint: #ccefe4;
        --pink: #ffd9e7;
        --blue: #d7eaff;
        --yellow: #fff0bd;
        --bg: #f8f8ff;
        --white: #fff;
        --danger: #ff91aa;
        --shadow: 0 10px 30px rgba(95, 89, 140, 0.11);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: linear-gradient(135deg, #f9f7ff, #f2fbf8);
        color: var(--ink);
        font-family: Prompt, sans-serif;
      }
      .top {
        padding: 22px max(18px, 5vw);
        background: linear-gradient(100deg, #dcd7ff, #ccefe4, #ffd9e7);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand {
        font-size: clamp(20px, 3vw, 30px);
        font-weight: 600;
      }
      .sub {
        font-size: 13px;
        opacity: 0.8;
      }
      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 14px max(18px, 5vw);
        position: sticky;
        top: 0;
        background: #ffffffdd;
        backdrop-filter: blur(10px);
        z-index: 5;
        box-shadow: 0 3px 16px #9b95bd19;
      }
      .nav button,
      .btn {
        border: 0;
        border-radius: 14px;
        padding: 10px 16px;
        font: inherit;
        color: var(--ink);
        cursor: pointer;
        background: var(--blue);
      }
      .nav button.active {
        background: var(--lav);
        font-weight: 600;
      }
      .wrap {
        max-width: 1180px;
        margin: 22px auto;
        padding: 0 18px;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }
      .card {
        background: #fff;
        border: 1px solid #ffffff;
        border-radius: 22px;
        padding: 22px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
      }
      .title {
        font-size: 21px;
        font-weight: 600;
        margin: 0 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .full {
        grid-column: 1/-1;
      }
      label {
        font-size: 13px;
        font-weight: 500;
        display: block;
        margin-bottom: 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #e4e3f1;
        border-radius: 12px;
        padding: 11px 12px;
        font: inherit;
        background: #fcfcff;
        color: var(--ink);
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: #a9a1eb;
        box-shadow: 0 0 0 3px #dcd7ff66;
      }
      textarea {
        min-height: 90px;
      }
      .req:after {
        content: " *";
        color: #f27c9c;
      }
      .equipment-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }
      .eq {
        border: 1px solid #e5e3f5;
        border-radius: 15px;
        padding: 12px;
        background: #fafaff;
      }
      .eq input {
        width: auto;
        margin-right: 8px;
      }
      .primary {
        background: linear-gradient(90deg, #bcb4ff, #9edfcf);
        font-weight: 600;
      }
      .danger {
        background: var(--pink);
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }
      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 15px;
      }
      .calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .dow {
        text-align: center;
        font-weight: 600;
        font-size: 13px;
        padding: 8px;
      }
      .day {
        min-height: 110px;
        border: 1px solid #eeecf6;
        border-radius: 12px;
        padding: 7px;
        background: #fff;
      }
      .day.muted {
        opacity: 0.35;
      }
      .daynum {
        font-size: 12px;
        font-weight: 600;
      }
      .event {
        font-size: 10px;
        margin-top: 4px;
        border-radius: 7px;
        padding: 4px 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        color: #334155;
        border-left: 5px solid var(--event-color, #9aa7b8);
        background: color-mix(in srgb, var(--event-color, #d7eaff) 30%, white);
      }
      .weekend { color: #e45469; }
      .month-pickers { display:flex; gap:8px; align-items:center; }
      .month-pickers select { width:auto; min-width:120px; font-weight:600; }
      .dashboard-strip { display:grid; grid-template-columns:repeat(5,minmax(130px,1fr)); gap:10px; margin-bottom:18px; }
      .dashboard-strip .stat { min-height:82px; }
      .data-controls { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:12px 0; }
      .data-controls input { flex:1 1 220px; }
      .data-controls select { width:auto; min-width:115px; }
      .s-wait {
        background: var(--yellow);
      }
      .s-ok {
        background: var(--mint);
      }
      .s-out {
        background: var(--blue);
      }
      .s-done {
        background: #e7e9ed;
      }
      .s-no {
        background: var(--pink);
      }
      .table-wrap {
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 880px;
      }
      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #eeedf5;
        font-size: 13px;
      }
      th {
        background: #f2f0ff;
      }
      .badge {
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 11px;
        display: inline-block;
      }
      .login {
        max-width: 430px;
        margin: 35px auto;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .toolbar input {
        max-width: 330px;
      }
      .admin-tabs { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 18px }
      .admin-tabs button { background:#f1efff }
      .admin-tabs button.active { background:linear-gradient(90deg,#cfc9ff,#bdeadd);font-weight:600 }
      .admin-panel { display:none }
      .admin-panel.active { display:block }
      .stats { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px }
      .stat { border-radius:18px;padding:18px;background:linear-gradient(135deg,#f0edff,#edfaf6) }
      .stat b { display:block;font-size:28px;margin-top:4px }
      .mini-btn { padding:7px 10px;border-radius:10px;border:0;background:var(--blue);cursor:pointer;font:inherit;font-size:12px;margin:2px }
      .mini-btn.edit { background:var(--yellow) }
      .mini-btn.off { background:var(--pink) }
      .form-check { display:flex;align-items:center;gap:8px }
      .form-check input { width:auto }
      .swal-check-group {
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:10px;
        margin-top:6px;
      }
      .swal-check-option {
        display:flex;
        align-items:center;
        gap:9px;
        min-height:44px;
        padding:9px 12px;
        border:1px solid #e1e3f4;
        border-radius:13px;
        background:#fafaff;
        cursor:pointer;
      }
      .swal-check-option:hover { background:#f2f0ff }
      .swal-check-option input { width:18px;height:18px;margin:0;accent-color:#8f88df }
      .swal2-popup { font-family:Prompt,sans-serif!important;border-radius:22px!important }
      .swal2-confirm,.swal2-cancel { border-radius:12px!important;font-family:Prompt,sans-serif!important }
      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        background: #fff;
        border-radius: 15px;
        padding: 14px 18px;
        box-shadow: var(--shadow);
        z-index: 20;
        display: none;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: #59617666;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 15;
        padding: 20px;
      }
      .modal .card {
        max-width: 560px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
      }
      .empty {
        text-align: center;
        padding: 30px;
        color: #8993a1;
      }
      .spinner {
        display: none;
        position: fixed;
        inset: 0;
        background: #ffffff99;
        z-index: 99;
        place-items: center;
        font-weight: 600;
      }
      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .day {
          min-height: 75px;
          padding: 4px;
        }
        .event {
          font-size: 0;
        }
        .event:after {
          content: "•";
          font-size: 16px;
        }
        .top {
          align-items: flex-start;
          gap: 10px;
        }
        .calendar {
          gap: 2px;
        }
        .dashboard-strip { grid-template-columns:repeat(2,minmax(0,1fr)); }
        .calendar-head { flex-wrap:wrap; }
        .month-pickers { order:-1; width:100%; justify-content:center; }
        .month-pickers select { min-width:0; flex:1; }
        .wrap { padding:0 8px; margin:10px auto; }
        .card { padding:14px; border-radius:16px; }
        .nav { overflow-x:auto; flex-wrap:nowrap; }
        .nav button { white-space:nowrap; }
        body { font-size:clamp(13px,3.5vw,16px); }
      }
    </style>
  </head>
  <body>
    <div class="spinner" id="spin">กำลังดำเนินการ...</div>
    <header class="top">
      <div>
        <div class="brand" id="brand">ระบบยืมอุปกรณ์</div>
        <div class="sub">จองง่าย ตรวจสอบสะดวก พร้อมใช้งานทุกวัน 🌿</div>
      </div>
      <div id="who"></div>
    </header>
    <nav class="nav">
      <button data-page="calendar" class="active">📅 ปฏิทิน</button
      ><button data-page="booking">✨ ยื่นคำขอ</button
      ><button data-page="status">🔎 ตรวจสอบสถานะ</button
      ><button data-page="admin">🔐 เจ้าหน้าที่</button>
    </nav>
    <main class="wrap">
      <section id="calendar" class="page active">
        <div class="dashboard-strip public-dashboard"></div>
        <div class="card">
          <div class="calendar-head">
            <button class="btn" onclick="moveMonth(-1)">‹ ก่อนหน้า</button>
            <div class="month-pickers">
              <select id="monthSelect" aria-label="เลือกเดือน"></select>
              <select id="yearSelect" aria-label="เลือกปี"></select>
            </div>
            <button class="btn" onclick="moveMonth(1)">ถัดไป ›</button>
          </div>
          <div class="calendar" id="cal"></div>
        </div>
      </section>
      <section id="booking" class="page">
        <div class="dashboard-strip public-dashboard"></div>
        <form class="card" id="bookingForm">
          <h2 class="title">แบบฟอร์มขอยืมอุปกรณ์</h2>
          <div class="grid">
            <div>
              <label class="req">ชื่อ–นามสกุล</label
              ><input name="borrowerName" required />
            </div>
            <div><label>ตำแหน่ง</label><input name="position" /></div>
            <div>
              <label class="req">หน่วยงาน/แผนก</label
              ><select name="department" id="department" required></select>
            </div>
            <div>
              <label class="req">เบอร์ติดต่อ</label
              ><input name="phone" required />
            </div>
            <div><label>อีเมล</label><input type="email" name="email" /></div>
            <div>
              <label class="req">สถานที่ใช้งาน</label
              ><input name="location" required />
            </div>
            <div>
              <label class="req">วันเวลารับ</label
              ><input type="datetime-local" name="borrowDateTime" required />
            </div>
            <div>
              <label class="req">วันเวลาคืน</label
              ><input type="datetime-local" name="returnDateTime" required />
            </div>
            <div class="full">
              <label class="req">วัตถุประสงค์</label
              ><textarea name="purpose" required></textarea>
            </div>
            <div class="full">
              <label class="req">เลือกอุปกรณ์</label>
              <div class="equipment-list" id="equipment"></div>
            </div>
            <div class="full">
              <label>หมายเหตุ</label><textarea name="note"></textarea>
            </div>
            <div class="full">
              <label>ไฟล์แนบ (ไม่เกิน 5 MB)</label
              ><input type="file" name="attachment" />
            </div>
          </div>
          <div class="actions">
            <button type="reset" class="btn">ล้างข้อมูล</button
            ><button class="btn primary">ส่งคำขอยืม</button>
          </div>
        </form>
      </section>
      <section id="status" class="page">
        <div class="dashboard-strip public-dashboard"></div>
        <div class="card">
          <h2 class="title">ตรวจสอบสถานะคำขอ</h2>
          <div class="toolbar">
            <input
              id="searchQ"
              placeholder="เลขที่คำขอ ชื่อ เบอร์โทร หรือแผนก"
            /><button class="btn primary" onclick="search()">ค้นหา</button>
          </div>
          <div id="results"></div>
        </div>
      </section>
      <section id="admin" class="page">
        <div class="dashboard-strip public-dashboard"></div>
        <div id="loginBox" class="card login">
          <h2 class="title">เข้าสู่ระบบเจ้าหน้าที่</h2>
          <label>ชื่อผู้ใช้</label><input id="username" /><br /><label
            >รหัสผ่าน</label
          ><input id="password" type="password" />
          <div class="actions">
            <button class="btn primary" onclick="login()">เข้าสู่ระบบ</button>
          </div>
          <div class="sub">ครั้งแรกใช้ admin / admin123 และควรเปลี่ยนทันที</div>
        </div>
        <div id="adminBox" style="display: none">
          <div class="card">
            <div class="calendar-head">
              <div><h2 class="title" style="margin-bottom:2px">ศูนย์จัดการระบบ</h2><span class="sub" id="adminRole"></span></div>
              <div>
                <button class="btn" onclick="openPassword()">
                  เปลี่ยนรหัสผ่าน
                </button>
                <button class="btn danger" onclick="logout()">
                  ออกจากระบบ
                </button>
              </div>
            </div>
            <div class="admin-tabs" id="adminTabs">
              <button class="btn active" data-admin="dashboard">📊 Dashboard</button>
              <button class="btn" data-admin="requests">📋 คำขอยืม</button>
              <button class="btn admin-only" data-admin="equipment">💻 อุปกรณ์</button>
              <button class="btn admin-only" data-admin="departments">🏢 หน่วยงาน</button>
              <button class="btn admin-only" data-admin="users">👥 ผู้ใช้งาน</button>
              <button class="btn admin-only" data-admin="settings">⚙️ ตั้งค่าระบบ</button>
              <button class="btn admin-only" data-admin="logs">🕘 ประวัติ</button>
            </div>
            <div id="admin-dashboard" class="admin-panel active"><div id="adminStats" class="stats"></div></div>
            <div id="admin-requests" class="admin-panel"><div id="adminResults"></div></div>
            <div id="admin-equipment" class="admin-panel"><div class="toolbar"><button class="btn primary" onclick="equipmentForm()">＋ เพิ่มอุปกรณ์</button></div><div id="equipmentAdmin"></div></div>
            <div id="admin-departments" class="admin-panel"><div class="toolbar"><button class="btn primary" onclick="departmentForm()">＋ เพิ่มหน่วยงาน</button></div><div id="departmentAdmin"></div></div>
            <div id="admin-users" class="admin-panel"><div class="toolbar"><button class="btn primary" onclick="userForm()">＋ เพิ่มผู้ใช้งาน</button></div><div id="userAdmin"></div></div>
            <div id="admin-settings" class="admin-panel"><form id="settingsForm" class="grid"></form></div>
            <div id="admin-logs" class="admin-panel"><div id="logAdmin"></div></div>
          </div>
        </div>
      </section>
    </main>
    <div class="modal" id="detailModal">
      <div class="card">
        <div id="detail"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">ปิด</button>
        </div>
      </div>
    </div>
    <script src="config.js"></script>
    <script>
      let DATA = { equipment: [], departments: [] },
        month = new Date(),
        events = [],
        ADMIN = null,
        token = localStorage.getItem("eqToken") || "",
        user = JSON.parse(localStorage.getItem("eqUser") || "null");
      const $ = (s) => document.querySelector(s),
        $$ = (s) => [...document.querySelectorAll(s)];
      function server(fn, ...args) {
        showSpin(1);
        return apiCall(fn, args)
          .then((x) => {
            showSpin(0);
            return x;
          })
          .catch((e) => {
            showSpin(0);
            notice(e.message || String(e), "error");
            throw e;
          });
      }
      function apiCall(action, args) {
        const url = window.APP_CONFIG && APP_CONFIG.API_URL;
        if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(url || ""))
          return Promise.reject(
            new Error("กรุณาตั้งค่า API_URL ในไฟล์ config.js ก่อนใช้งาน"),
          );
        const packed = JSON.stringify(args);
        const readOnly = [
          "getInitialData",
          "getCalendarEvents",
          "getAvailableEquipment",
          "searchBookings",
        ].includes(action);
        if (!readOnly || packed.length > 7000) {
          return fetch(url, {
            method: "POST",
            redirect: "follow",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action, args }),
          })
            .then((r) => r.json())
            .then(unwrap);
        }
        return new Promise((resolve, reject) => {
          const cb =
            "gasCb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
          const script = document.createElement("script");
          const timer = setTimeout(
            () => finish(new Error("เชื่อมต่อ API ไม่สำเร็จ")),
            30000,
          );
          function finish(err, value) {
            clearTimeout(timer);
            delete window[cb];
            script.remove();
            err ? reject(err) : resolve(value);
          }
          window[cb] = (payload) => {
            try {
              finish(null, unwrap(payload));
            } catch (e) {
              finish(e);
            }
          };
          script.onerror = () => finish(new Error("โหลด API ไม่สำเร็จ"));
          script.src =
            url +
            "?action=" +
            encodeURIComponent(action) +
            "&args=" +
            encodeURIComponent(packed) +
            "&callback=" +
            cb +
            "&_=" +
            Date.now();
          document.head.appendChild(script);
        });
      }
      function unwrap(payload) {
        if (!payload || payload.ok !== true)
          throw new Error((payload && payload.error) || "API ตอบกลับไม่ถูกต้อง");
        return payload.data;
      }
      function showSpin(v) {
        $("#spin").style.display = v ? "grid" : "none";
      }
      function notice(text, icon = "success", title = "") {
        return Swal.fire({
          icon, title: title || (icon === "error" ? "ไม่สำเร็จ" : "เรียบร้อย"),
          text, confirmButtonText: "ตกลง", confirmButtonColor: "#8f88df"
        });
      }
      $$(".nav button").forEach(
        (b) =>
          (b.onclick = () => {
            $$(".nav button").forEach((x) => x.classList.remove("active"));
            b.classList.add("active");
            $$(".page").forEach((x) => x.classList.remove("active"));
            $("#" + b.dataset.page).classList.add("active");
            if (b.dataset.page === "calendar") loadCalendar();
            if (b.dataset.page === "admin" && token) loadAdmin();
          }),
      );
      $("#adminTabs").onclick = (e) => {
        const b=e.target.closest("[data-admin]"); if(!b)return;
        $$("#adminTabs button").forEach(x=>x.classList.remove("active")); b.classList.add("active");
        $$(".admin-panel").forEach(x=>x.classList.remove("active"));
        $("#admin-"+b.dataset.admin).classList.add("active");
      };
      async function init() {
        DATA = await server("getInitialData");
        $("#brand").textContent = DATA.systemName;
        renderPublicDashboard();
        setupMonthPickers();
        $("#department").innerHTML =
          '<option value="">เลือกหน่วยงาน</option>' +
          DATA.departments
            .map((d) => `<option>${esc(d.department_name)}</option>`)
            .join("");
        renderAvailableEquipment([]);
        refreshUser();
        loadCalendar();
      }
      async function loadCalendar() {
        let a = new Date(month.getFullYear(), month.getMonth(), 1),
          b = new Date(month.getFullYear(), month.getMonth() + 1, 0, 23, 59);
        events = await server(
          "getCalendarEvents",
          a.toISOString(),
          b.toISOString(),
        );
        renderCalendar();
      }
      function setupMonthPickers() {
        const months=Array.from({length:12},(_,i)=>new Date(2020,i,1).toLocaleDateString("th-TH",{month:"long"}));
        $("#monthSelect").innerHTML=months.map((x,i)=>`<option value="${i}">${x}</option>`).join("");
        const now=new Date().getFullYear(), years=Array.from({length:11},(_,i)=>now-5+i);

      function syncMonthPickers(){
        $("#monthSelect").value=month.getMonth();
        if(![...$year().options].some(o=>+o.value===month.getFullYear()))$year().add(new Option(String(month.getFullYear()+543),month.getFullYear()));
        $year().value=month.getFullYear();

      function renderCalendar() {
        const names = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];
        syncMonthPickers();
        let first = new Date(month.getFullYear(), month.getMonth(), 1),
          start = new Date(first);
        start.setDate(1 - first.getDay());
        let html = names.map((x,i) => `<div class="dow ${i===0||i===6?"weekend":""}">${x}</div>`).join("");
        for (let i = 0; i < 42; i++) {
          let d = new Date(start);
          d.setDate(start.getDate() + i);
          let ev = events.filter((e) => {
            let a = new Date(e.start),
              b = new Date(e.end);
            return (
              d >= new Date(a.getFullYear(), a.getMonth(), a.getDate()) &&
              d <= new Date(b.getFullYear(), b.getMonth(), b.getDate())
            );
          });
          html += `<div class="day ${d.getMonth() !== month.getMonth() ? "muted" : ""}"><div class="daynum">${d.getDate()}</div>${ev
            .slice(0, 4)
            .map(
              (e) =>
                `<div class="event" style="--event-color:${esc(e.color||"#9ecff5")}" onclick='showEvent(${JSON.stringify(JSON.stringify(e))})'>${esc(e.title)}</div>`,
            )
            .join("")}</div>`;
        }
        $("#cal").innerHTML = html;
      }

        const map=Object.fromEntries((ADMIN.settings||[]).map(x=>[x.setting_key,x.setting_value]));
        const fields=[["ชื่อระบบ","SYSTEM_NAME","text"],["คำนำหน้าเลขคำขอ","BOOKING_PREFIX","text"],["จำนวนวันที่ยืมสูงสุด","MAX_BORROW_DAYS","number"],["ชั่วโมงก่อนถือว่าล่าช้า","LATE_RETURN_HOURS","number"],["Google Drive Folder ID","DRIVE_FOLDER_ID","text"],["อีเมลผู้ดูแล","ADMIN_EMAIL","email"]];
        $("#settingsForm").innerHTML=fields.map(x=>`<div><label>${x[0]}</label><input name="${x[1]}" type="${x[2]}" value="${esc(map[x[1]]||"")}"></div>`).join("")+
          `<div class="form-check"><input type="checkbox" name="REQUIRE_APPROVAL" ${truth(map.REQUIRE_APPROVAL)?"checked":""}><label>ต้องอนุมัติก่อนยืม</label></div><div class="form-check"><input type="checkbox" name="ENABLE_EMAIL" ${truth(map.ENABLE_EMAIL)?"checked":""}><label>เปิดแจ้งเตือนอีเมล</label></div><div class="form-check"><input type="checkbox" name="ENABLE_LINE" ${truth(map.ENABLE_LINE)?"checked":""}><label>เปิดแจ้งเตือน LINE</label></div><div class="full actions"><button class="btn primary">บันทึกการตั้งค่า</button></div>`;
        $("#settingsForm").onsubmit=saveSettingsForm;
      }
      async function saveSettingsForm(e){e.preventDefault();const f=new FormData(e.target),d=Object.fromEntries(f.entries());["REQUIRE_APPROVAL","ENABLE_EMAIL","ENABLE_LINE"].forEach(k=>d[k]=e.target.elements[k].checked?"TRUE":"FALSE");await server("saveSettings",token,d);await notice("บันทึกการตั้งค่าระบบแล้ว");await reloadAdminAndPublic();}
      function renderLogs(){
        $("#logAdmin").innerHTML=adminTable(["วันเวลา","ผู้ทำรายการ","การดำเนินการ","ข้อมูลอ้างอิง","รายละเอียด"],(ADMIN.logs||[]).map(l=>`<tr><td>${fmt(l.timestamp)}</td><td>${esc(l.user_name||"-")}</td><td>${esc(l.action||"-")}</td><td>${esc(l.reference_type||"")} ${esc(l.reference_id||"")}</td><td>${esc(l.detail||"-")}</td></tr>`));
      }
      function formGrid(fields){return `<div class="grid" style="text-align:left">${fields.map(x=>`<div><label>${x[0]}</label><input class="swal-field" name="${x[1]}" type="${x[3]||"text"}" value="${esc(x[2]||"")}"></div>`).join("")}</div>`}
      function formInput(label,name,value,type="text"){return `<div><label>${label}</label><input class="swal-field" name="${name}" type="${type}" value="${esc(value||"")}"></div>`}
      function selectOptions(options,current){return options.map(x=>`<option value="${esc(x)}" ${String(current)===x?"selected":""}>${esc(x)}</option>`).join("")}
      function swalData(){return Object.fromEntries([...Swal.getHtmlContainer().querySelectorAll(".swal-field")].map(x=>[x.name,x.value.trim()]))}
      async function toggleItem(type,id,active){
        const r=await Swal.fire({icon:"warning",title:active?"เปิดใช้งานข้อมูลนี้?":"ระงับการใช้งาน?",text:id,showCancelButton:true,confirmButtonText:"ยืนยัน",cancelButtonText:"ยกเลิก",confirmButtonColor:active?"#75bea9":"#ef7898"});if(!r.isConfirmed)return;
        await server("toggleMaster",token,type,id,active);await notice(active?"เปิดใช้งานแล้ว":"ระงับการใช้งานแล้ว");await reloadAdminAndPublic();
      }
      async function reloadAdminAndPublic(){await loadAdmin();DATA=await server("getInitialData");$("#brand").textContent=DATA.systemName;$("#department").innerHTML='<option value="">เลือกหน่วยงาน</option>'+DATA.departments.map(d=>`<option>${esc(d.department_name)}</option>`).join("");$("#equipment").innerHTML=DATA.equipment.map(e=>`<label class="eq"><input type="checkbox" name="equipmentIds" value="${esc(e.equipment_id)}"><b>${esc(e.equipment_name)}</b><br><span class="sub">${esc(e.asset_code||e.equipment_id)} · ${esc(e.category||"")}</span></label>`).join("")||'<div class="empty">ยังไม่มีอุปกรณ์ที่เปิดใช้งาน</div>';}
      function renderPublicDashboard(){
        const s=DATA.summary||{};
        const cards=[["💻","อุปกรณ์ทั้งหมด",s.totalEquipment||0],["✅","พร้อมใช้งาน",s.available||0],["⏳","รออนุมัติ",s.waiting||0],["📦","กำลังยืม",s.borrowing||0],["⚠️","คืนล่าช้า",s.late||0]];
        $$(".public-dashboard").forEach(el=>el.innerHTML=cards.map(x=>`<div class="stat"><span>${x[0]} ${x[1]}</span><b>${x[2]}</b></div>`).join(""));
      }
      const tableStates={};
      function renderDataTable(target,rows,key,renderer){
        tableStates[key]=tableStates[key]||{q:"",sort:"desc",size:10,page:1};
        const s=tableStates[key], filtered=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(s.q.toLowerCase()))
          .sort((a,b)=>(String(a.created_at||a.booking_id||"").localeCompare(String(b.created_at||b.booking_id||"")))*(s.sort==="asc"?1:-1));
        const total=Math.max(1,Math.ceil(filtered.length/s.size));s.page=Math.min(s.page,total);
        const part=filtered.slice((s.page-1)*s.size,s.page*s.size);
        $(target).innerHTML=`<div class="data-controls"><input placeholder="ค้นหาข้อมูล..." value="${esc(s.q)}" oninput="tableChange('${key}','q',this.value,'${target}')"><select onchange="tableChange('${key}','sort',this.value,'${target}')"><option value="desc" ${s.sort==="desc"?"selected":""}>ใหม่ → เก่า</option><option value="asc" ${s.sort==="asc"?"selected":""}>เก่า → ใหม่</option></select><select onchange="tableChange('${key}','size',this.value,'${target}')">${[10,20,50,100].map(n=>`<option ${s.size===n?"selected":""}>${n}</option>`).join("")}</select><button class="btn" onclick="exportRows('${key}')">ส่งออก CSV</button><span class="sub">หน้า ${s.page}/${total}</span><button class="btn" onclick="tablePage('${key}',-1,'${target}')">‹</button><button class="btn" onclick="tablePage('${key}',1,'${target}')">›</button></div>${renderer(part)}`;
        tableStates[key].rows=rows;tableStates[key].renderer=renderer;
      }
      function tableChange(key,field,value,target){const s=tableStates[key];s[field]=field==="size"?+value:value;s.page=1;renderDataTable(target,s.rows,key,s.renderer)}
      function tablePage(key,n,target){const s=tableStates[key];s.page=Math.max(1,s.page+n);renderDataTable(target,s.rows,key,s.renderer)}
      function exportRows(key){const s=tableStates[key],rows=s.rows.filter(r=>JSON.stringify(r).toLowerCase().includes(s.q.toLowerCase()));downloadCsv(key+".csv",rows)}
      function downloadCsv(name,rows){if(!rows.length)return notice("ไม่มีข้อมูลสำหรับส่งออก","warning");const keys=Object.keys(rows[0]).filter(k=>typeof rows[0][k]!=="object"),cell=v=>`"${String(v??"").replaceAll('"','""')}"`,csv="\uFEFF"+keys.map(cell).join(",")+"\n"+rows.map(r=>keys.map(k=>cell(r[k])).join(",")).join("\n"),a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
      function enhanceAdminTables(){
        ["admin-equipment","admin-departments","admin-users","admin-logs"].forEach(id=>{const panel=$("#"+id),table=panel&&panel.querySelector("table");if(!table||panel.querySelector(".data-controls"))return;const rows=[...table.tBodies[0].rows],controls=document.createElement("div");controls.className="data-controls";controls.innerHTML='<input placeholder="ค้นหาข้อมูล..."><select><option value="desc">ใหม่ → เก่า</option><option value="asc">เก่า → ใหม่</option></select><select><option>10</option><option>20</option><option>50</option><option>100</option></select><button class="btn">ส่งออก CSV</button>';panel.insertBefore(controls,panel.querySelector(".table-wrap"));const [q,sort,size,btn]=controls.children;function apply(){const list=rows.filter(r=>r.innerText.toLowerCase().includes(q.value.toLowerCase()));list.sort((a,b)=>a.rowIndex-b.rowIndex);if(sort.value==="desc")list.reverse();rows.forEach(r=>r.style.display="none");list.slice(0,+size.value).forEach(r=>{r.style.display="";table.tBodies[0].appendChild(r)})}q.oninput=sort.onchange=size.onchange=apply;btn.onclick=()=>downloadCsv(id+".csv",rows.filter(r=>r.style.display!=="none").map(r=>Object.fromEntries([...r.cells].map((c,i)=>["คอลัมน์ "+(i+1),c.innerText]))));apply()})}
      async function reloadAdminAndPublic(){await loadAdmin();DATA=await server("getInitialData");$("#brand").textContent=DATA.systemName;renderPublicDashboard();$("#department").innerHTML='<option value="">เลือกหน่วยงาน</option>'+DATA.departments.map(d=>`<option>${esc(d.department_name)}</option>`).join("");renderAvailableEquipment([]);}
      function esc(v) {
        return String(v ?? "").replace(
          /[&<>'"]/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "'": "&#39;",
              '"': "&quot;",
            })[c],
        );
      }
      function fmt(v) {
        if (!v) return "-";
        let d = new Date(v);
        return isNaN(d)
          ? esc(v)
          : d.toLocaleString("th-TH", {
              dateStyle: "medium",
              timeStyle: "short",
            });
      }
      init();
    </script>
  </body>
</html>
